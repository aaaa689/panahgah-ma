<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پناهگاه امن ما</title>
    
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #ff2a85;
            --secondary: #8a2be2;
            --bg-gradient: linear-gradient(135deg, #090a0f 0%, #151828 100%);
            --surface: rgba(30, 32, 47, 0.7);
            --surface-solid: #232536;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8f8f2;
            --text-muted: #9aa5ce;
            --success: #00e676;
            --warning: #ffea00;
            --info: #00e5ff;
            --glow-pink: 0 0 20px rgba(255, 42, 133, 0.4);
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            padding: 30px 25px;
            margin-top: 2vh;
            position: relative;
            overflow: hidden;
        }

        .app-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--info), var(--secondary));
        }

        /* Loading Overlay */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(9, 10, 15, 0.85);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-weight: bold;
            transition: opacity 0.3s;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255, 42, 133, 0.3);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 {
            background: linear-gradient(to right, #ff7eb3, #ff2a85);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 1.8rem; font-weight: 800; margin: 0 0 5px 0;
            text-shadow: 0 0 30px rgba(255, 42, 133, 0.3);
        }
        .header p { color: var(--text-muted); font-size: 0.95rem; margin: 0; }

        .tabs {
            display: flex; background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color); border-radius: 16px;
            padding: 6px; margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1; padding: 12px 5px; border: none; background: transparent;
            border-radius: 12px; cursor: pointer; font-family: inherit; font-weight: 700;
            font-size: 0.85rem; color: var(--text-muted); transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .tab-btn.active {
            background: var(--surface-solid); color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);
        }
        .tab-btn:nth-child(1).active { color: #ff7eb3; }
        .tab-btn:nth-child(2).active { color: var(--warning); }
        .tab-btn:nth-child(3).active { color: var(--info); }

        .section { display: none; animation: fadeIn 0.4s ease forwards; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .chart-wrapper {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px; padding: 15px; margin-bottom: 20px;
            border: 1px solid var(--border-color); position: relative; height: 200px;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 700; color: #b2bec3; }
        input, select, textarea {
            width: 100%; padding: 14px 15px; border: 1px solid var(--border-color);
            border-radius: 12px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box;
            background: rgba(0, 0, 0, 0.4); color: var(--text-main); transition: 0.3s;
        }
        textarea { resize: vertical; min-height: 80px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 42, 133, 0.2); }
        select option { background: var(--surface-solid); color: var(--text-main); }

        .btn-main {
            width: 100%; padding: 15px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 12px; cursor: pointer; font-family: inherit;
            font-weight: 700; font-size: 1rem; transition: 0.3s; display: flex; justify-content: center;
            align-items: center; gap: 8px; box-shadow: var(--glow-pink);
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(255, 42, 133, 0.6); }

        .card {
            background: var(--surface-solid); border-radius: 16px; padding: 18px; margin-bottom: 15px;
            border: 1px solid var(--border-color); position: relative; transition: 0.2s;
        }
        .card-date { font-size: 0.75rem; color: #636e72; position: absolute; left: 18px; top: 18px; }
        .card-content p { margin: 8px 0; font-size: 0.95rem; line-height: 1.6; }
        .card-content strong { color: #ff7eb3; }

        .btn-read {
            width: 100%; background-color: rgba(255, 255, 255, 0.05); color: var(--text-main);
            border: 1px solid var(--border-color); padding: 12px; border-radius: 10px;
            cursor: pointer; font-family: inherit; font-weight: 700; font-size: 0.85rem; margin-top: 15px; transition: 0.3s;
        }
        .btn-read:not(:disabled):hover { background-color: rgba(255, 255, 255, 0.1); }
        .btn-read:disabled { background-color: rgba(0, 230, 118, 0.1); color: var(--success); border-color: rgba(0, 230, 118, 0.3); cursor: default; }

        .light-grid { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-light {
            flex: 1; padding: 15px; border: 1px solid transparent; border-radius: 16px; cursor: pointer;
            font-family: inherit; font-weight: 700; font-size: 0.9rem; display: flex; flex-direction: column;
            align-items: center; gap: 8px; transition: 0.3s; background: rgba(0,0,0,0.3);
        }
        .btn-light i { font-size: 1.8rem; }
        .btn-green { color: var(--success); border-color: rgba(0, 230, 118, 0.2); }
        .btn-green:hover { background: rgba(0, 230, 118, 0.1); box-shadow: 0 0 20px rgba(0, 230, 118, 0.2); }
        .btn-yellow { color: var(--warning); border-color: rgba(255, 234, 0, 0.2); }
        .btn-yellow:hover { background: rgba(255, 234, 0, 0.1); box-shadow: 0 0 20px rgba(255, 234, 0, 0.2); }

        .indicator { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin-left: 10px; }
        .ind-green { background: var(--success); box-shadow: 0 0 12px var(--success); }
        .ind-yellow { background: var(--warning); box-shadow: 0 0 12px var(--warning); }

        .empty-state { text-align: center; padding: 30px 10px; color: var(--text-muted); font-size: 0.95rem; }
        
        .golden-rule-card {
            background: linear-gradient(145deg, rgba(0, 229, 255, 0.1), rgba(0, 0, 0, 0.4));
            border-right: 4px solid var(--info); border-radius: 0 12px 12px 0;
            padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.05); position: relative;
        }
        .golden-rule-card::before {
            content: '«'; position: absolute; right: 10px; top: 5px; font-size: 3rem;
            color: rgba(0, 229, 255, 0.15); font-family: serif;
        }
        hr { border: 0; height: 1px; background: var(--border-color); margin: 20px 0; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div id="loadingText">در حال اتصال به قلب پناهگاه...</div>
</div>

<div class="app-container">
    <div class="header">
        <h1>پناهگاه امن ما <i class="fa-solid fa-heart-pulse" style="font-size: 1.3rem; color: #ff2a85;"></i></h1>
        <p>جایی برای شنیده شدن و رشد کردن</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('letters')"><i class="fa-solid fa-envelope"></i> نامه‌ها</button>
        <button class="tab-btn" onclick="showTab('lights')"><i class="fa-solid fa-traffic-light"></i> چراغ‌ها</button>
        <button class="tab-btn" onclick="showTab('rules')"><i class="fa-solid fa-book-open"></i> حرف‌های مشاور</button>
    </div>

    <div id="letters" class="section active">
        <div class="chart-wrapper"><canvas id="lettersChart"></canvas></div>
        <div style="background: rgba(255, 42, 133, 0.05); border: 1px solid rgba(255, 42, 133, 0.2); padding: 20px; border-radius: 16px; margin-bottom: 25px;">
            <div class="input-group">
                <label>دقیقاً چه اتفاقی افتاد؟ (بدون قضاوت)</label>
                <input type="text" id="letterEvent" placeholder="مثلاً: امروز وقتی فلان رفتار رو دیدم...">
            </div>
            <div class="input-group">
                <label>چه حسی به من داد؟</label>
                <select id="letterFeeling">
                    <option value="نادیده گرفته شدن">حس نادیده گرفته شدن</option>
                    <option value="ناامنی و نگرانی">حس ناامنی و نگرانی</option>
                    <option value="تنهایی و فاصله">حس تنهایی و فاصله</option>
                    <option value="بی‌ارزش بودن">حس بی‌ارزش بودن</option>
                </select>
            </div>
            <div class="input-group">
                <label>چیزی که الان حالم رو بهتر می‌کنه:</label>
                <input type="text" id="letterNeed" placeholder="مثلاً: نیاز دارم کمی با آرامش حرف بزنیم">
            </div>
            <button class="btn-main" onclick="addLetter()"><i class="fa-solid fa-paper-plane"></i> ارسال به صندوق</button>
        </div>
        <div id="lettersList"></div>
    </div>

    <div id="lights" class="section">
        <div class="chart-wrapper"><canvas id="lightsChart"></canvas></div>
        <div class="light-grid">
            <button class="btn-light btn-green" onclick="addLight('green')"><i class="fa-solid fa-face-smile-beam"></i> ثبت کار قشنگ</button>
            <button class="btn-light btn-yellow" onclick="addLight('yellow')"><i class="fa-solid fa-triangle-exclamation"></i> ثبت کم‌کاری</button>
        </div>
        <div class="input-group"><input type="text" id="lightDesc" placeholder="توضیح کوتاه بنویس..."></div>
        <hr>
        <div id="lightsList"></div>
    </div>

    <div id="rules" class="section">
        <div style="text-align: center; margin-bottom: 25px;">
            <i class="fa-solid fa-feather-pointed" style="font-size: 2.5rem; color: var(--info); opacity: 0.8; margin-bottom: 10px;"></i>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin: 0;">چراغ‌قوه‌های ما برای روزهای تاریک</p>
        </div>
        <div class="input-group">
            <label>ثبت نکته جدید از جلسه مشاوره</label>
            <textarea id="ruleInput" placeholder="مثال: مشاور گفت وقتی عصبانی هستیم، ۱۰ دقیقه به هم زمان بدیم..."></textarea>
            <button class="btn-main" style="background: linear-gradient(135deg, #00c6ff, #0072ff); box-shadow: 0 0 20px rgba(0, 198, 255, 0.4); margin-top: 15px;" onclick="addRule()"><i class="fa-solid fa-thumbtack"></i> سنجاق کردن در دفترچه</button>
        </div>
        <hr>
        <div id="rulesList" style="display: flex; flex-direction: column; gap: 10px;"></div>
    </div>
</div>

<script>
    // ==========================================
    // ⚠️ تنظیمات دیتابیس (اطلاعات قدم دوم را اینجا وارد کن)
    // ==========================================
    const BIN_ID = '6a34f9d9f5f4af5e290db5cf'; // کدی که در قدم اول بعد از Save گرفتی را اینجا بگذار
    const API_KEY = '$2a$10$9SiPBjmNKIyd2HVpcWGh4uKWifMszPhEfy82LaOovXrMgpNWp9eIi'; // Master Key که ساختی را اینجا بگذار
    // ==========================================

    Chart.defaults.font.family = 'Vazirmatn';
    Chart.defaults.color = '#9aa5ce';
    Chart.defaults.plugins.legend.labels.font = { family: 'Vazirmatn', size: 12 };

    let lettersChartInstance = null; let lightsChartInstance = null;
    let dbData = { letters: [], lights: [], rules: [] };

    // نمایش و مخفی کردن لودینگ
    function showLoading(text) {
        document.getElementById('loadingText').innerText = text;
        document.getElementById('loadingOverlay').style.display = 'flex';
    }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }

    // اتصال به دیتابیس ابری (دریافت اطلاعات)
    async function fetchFromCloud() {
        if(BIN_ID === 'YOUR_BIN_ID') {
            alert("لطفا اول کدهای BIN_ID و API_KEY را در کد HTML وارد کن!");
            hideLoading(); return;
        }
        showLoading("در حال همگام‌سازی با پناهگاه...");
        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const result = await response.json();
            dbData = result.record;
            if(!dbData.letters) dbData.letters = [];
            if(!dbData.lights) dbData.lights = [];
            if(!dbData.rules) dbData.rules = [];
            updateAllViews();
        } catch (error) {
            alert('ارتباط با سرور برقرار نشد. لطفا اینترنت را چک کن.');
            console.error(error);
        }
        hideLoading();
    }

    // آپدیت اطلاعات در دیتابیس ابری
    async function saveToCloud() {
        showLoading("در حال ثبت در قلب پناهگاه...");
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify(dbData)
            });
            updateAllViews();
        } catch (error) {
            alert('ذخیره اطلاعات با خطا مواجه شد!');
            console.error(error);
        }
        hideLoading();
    }

    function updateAllViews() { renderLetters(); renderLights(); renderRules(); }

    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- Letters ---
    async function addLetter() {
        const event = document.getElementById('letterEvent').value.trim();
        const feeling = document.getElementById('letterFeeling').value;
        const need = document.getElementById('letterNeed').value.trim();
        if(!event || !need) { alert('لطفاً جاهای خالی رو پر کن 🌹'); return; }

        dbData.letters.unshift({ id: Date.now(), event, feeling, need, read: false, date: new Date().toLocaleDateString('fa-IR') });
        document.getElementById('letterEvent').value = ''; document.getElementById('letterNeed').value = '';
        await saveToCloud();
    }

    async function markAsRead(id) {
        const letter = dbData.letters.find(l => l.id === id);
        if(letter) { letter.read = true; await saveToCloud(); }
    }

    function renderLetters() {
        const list = document.getElementById('lettersList');
        updateLettersChart();
        if(dbData.letters.length === 0) { list.innerHTML = `<div class="empty-state">صندوق نامه‌ها خالیه.<br>این یعنی در حال حاضر اوضاع آرومه!</div>`; return; }
        list.innerHTML = dbData.letters.map(l => `
            <div class="card" style="border-left: 3px solid #ff2a85;">
                <span class="card-date">${l.date}</span>
                <div class="card-content"><p><strong>اتفاق:</strong> ${l.event}</p><p><strong>حس من:</strong> ${l.feeling}</p><p><strong>نیاز من:</strong> ${l.need}</p></div>
                <button class="btn-read" ${l.read ? 'disabled' : ''} onclick="markAsRead(${l.id})">${l.read ? '<i class="fa-solid fa-check-double"></i> خواندم و درک می‌کنم' : 'تایید احساس'}</button>
            </div>
        `).join('');
    }

    function updateLettersChart() {
        const ctx = document.getElementById('lettersChart').getContext('2d');
        const counts = { "نادیده گرفته شدن": 0, "ناامنی و نگرانی": 0, "تنهایی و فاصله": 0, "بی‌ارزش بودن": 0 };
        dbData.letters.forEach(l => { if(counts[l.feeling] !== undefined) counts[l.feeling]++; });

        if(lettersChartInstance) lettersChartInstance.destroy();
        lettersChartInstance = new Chart(ctx, {
            type: 'bar',
            data: { labels: Object.keys(counts), datasets: [{ label: 'تعداد', data: Object.values(counts), backgroundColor: ['#ff7eb3', '#8a2be2', '#00e5ff', '#ffea00'], borderRadius: 6 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }, plugins: { legend: { display: false } } }
        });
    }

    // --- Lights ---
    async function addLight(type) {
        const desc = document.getElementById('lightDesc').value.trim();
        if(!desc) { alert('توضیح کوتاه یادت نره 🌹'); return; }
        dbData.lights.unshift({ type, desc, date: new Date().toLocaleDateString('fa-IR') });
        document.getElementById('lightDesc').value = '';
        await saveToCloud();
    }

    function renderLights() {
        const list = document.getElementById('lightsList');
        updateLightsChart();
        if(dbData.lights.length === 0) { list.innerHTML = `<div class="empty-state">هنوز چراغی ثبت نشده.</div>`; return; }
        list.innerHTML = dbData.lights.map(l => {
            const isGreen = l.type === 'green';
            return `<div class="card" style="display: flex; align-items: center; border-left: 3px solid ${isGreen ? 'var(--success)' : 'var(--warning)'};">
                <div class="indicator ${isGreen ? 'ind-green' : 'ind-yellow'}"></div>
                <div style="flex: 1;"><p style="margin: 0; font-size: 0.95rem; color: #fff;">${l.desc}</p></div>
                <span style="font-size: 0.75rem; color: #636e72;">${l.date}</span>
            </div>`
        }).join('');
    }

    function updateLightsChart() {
        const ctx = document.getElementById('lightsChart').getContext('2d');
        let green = 0, yellow = 0;
        dbData.lights.forEach(l => l.type === 'green' ? green++ : yellow++);

        if(lightsChartInstance) lightsChartInstance.destroy();
        lightsChartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['سبز', 'زرد'], datasets: [{ data: [green, yellow], backgroundColor: ['#00e676', '#ffea00'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, cutout: '70%' }
        });
    }

    // --- تابع حذف حرف مشاور ---
    async function deleteRule(index) {
        if(confirm('آیا مطمئنی که می‌خواهی این نکته را پاک کنی؟')) {
            dbData.rules.splice(index, 1); // حذف آیتم از آرایه بر اساس شماره ایندکس
            await saveToCloud(); // ذخیره تغییرات در دیتابیس ابری
        }
    }

    // --- Rules ---
    async function addRule() {
        const rule = document.getElementById('ruleInput').value.trim();
        if(!rule) return;
        dbData.rules.unshift({ text: rule, date: new Date().toLocaleDateString('fa-IR') });
        document.getElementById('ruleInput').value = '';
        await saveToCloud();
    }

    function renderRules() {
        const list = document.getElementById('rulesList');
        if(dbData.rules.length === 0) { list.innerHTML = `<div class="empty-state">هنوز نکته‌ای از مشاور ثبت نکردیم.</div>`; return; }
        
        // اضافه شدن index به مپ برای پیدا کردن دقیق آیتم هنگام حذف
        list.innerHTML = dbData.rules.map((r, index) => `
            <div class="golden-rule-card">
                <span style="font-size: 0.75rem; color: #636e72; display: block; margin-bottom: 8px;">${r.date}</span>
                <p style="margin: 0; font-size: 1rem; line-height: 1.8; color: #e0e0e0;">${r.text}</p>
                
                <button onclick="deleteRule(${index})" style="position: absolute; left: 15px; top: 15px; background: rgba(255, 42, 133, 0.1); border: 1px solid rgba(255, 42, 133, 0.3); color: #ff2a85; border-radius: 8px; padding: 6px 10px; cursor: pointer; font-family: inherit; transition: 0.3s;" onmouseover="this.style.background='rgba(255, 42, 133, 0.2)'" onmouseout="this.style.background='rgba(255, 42, 133, 0.1)'">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            </div>
        `).join('');
    }

    // هنگام باز شدن صفحه، اطلاعات را از اینترنت می‌خواند
    window.onload = () => {
        fetchFromCloud();
    };
</script>

</body>
</html>
